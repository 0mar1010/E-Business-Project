apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: beroo-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: beroo.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: beroo-backend-service
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: beroo-frontend-service
                port:
                  number: 80
